<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD to PDF - Web</title>
  
  <!-- MathJax для формул -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      chtml: {
        fontURL: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/output/chtml/fonts/woff-v2'
      },
      options: {
        ignoreHtmlClass: 'mathjax-ignore'
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  
  <!-- Стили для loading overlay -->
  <style>
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loading-spinner {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #666;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="dark"] .loading-overlay {
      background: rgba(30, 30, 30, 0.9);
    }
    [data-theme="dark"] .loading-text {
      color: #ccc;
    }
    [data-theme="dark"] .spinner {
      border-color: #444;
      border-top-color: #007bff;
    }
  </style>
</head>
<body>
  <!-- КАСТОМНАЯ ШАПКА (только для красоты, без drag-n-drop) -->
  <div class="title-bar" style="background: #f0f0f0; padding: 8px 16px; display: flex; justify-content: center; align-items: center;">
    <span class="app-title" style="font-weight: bold; color: #333;">MD to PDF - Веб-версия</span>
  </div>
  
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <div class="loading-text">Загрузка...</div>
    </div>
  </div>
  
  <script type="module" crossorigin src="/assets/index-Btsjwntr.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DHGWAdfx.css">
</body>
</html>
