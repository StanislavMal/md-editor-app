<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MD to PDF</title>
    
  <style>
    .icon { width: 16px; height: 16px; display: inline-block; vertical-align: middle; }
    .icon-lg { width: 18px; height: 18px; }
  </style>
</head>
<body>

  <!-- ВЕРХНЯЯ ПАНЕЛЬ ИНСТРУМЕНТОВ -->
  <div class="toolbar">
    <div class="toolbar-section toolbar-left">
      <!-- Открыть -->
      <div class="toolbar-group">
        <button id="open-btn" class="btn-secondary">
          <svg class="icon icon-lg" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5a.25.25 0 0 1-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75z"/></svg>
          <span class="btn-text">Открыть</span>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Форматирование -->
      <div class="toolbar-group">
        <button id="btn-bold" class="btn-icon" title="Жирный (Ctrl+B)" aria-label="Жирный">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2h5.5a3.5 3.5 0 0 1 2.5 6 3.5 3.5 0 0 1-2.5 6H4V2zm5.5 5a1.5 1.5 0 1 0 0-3H6v3h3.5zM6 9v3h3.5a1.5 1.5 0 1 0 0-3H6z"/></svg>
        </button>
        <button id="btn-italic" class="btn-icon" title="Курсив (Ctrl+I)" aria-label="Курсив">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M7.5 2h5v1h-2l-2.5 10h2v1h-5v-1h2l2.5-10h-2V2z"/></svg>
        </button>
        <button id="btn-heading" class="btn-icon" title="Заголовок (Ctrl+H)" aria-label="Заголовок">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h2v5h6V2h2v12h-2V9H4v5H2V2zm10 10h2v2h-2v-2z"/></svg>
        </button>

        <div class="toolbar-divider"></div>

        <button id="btn-quote" class="btn-icon" title="Цитата (Ctrl+Q)" aria-label="Цитата">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 4h3v3H2V4zm0 5h3v3H2V9zm5-5h3v3H7V4z"/></svg>
        </button>
        <button id="btn-ul" class="btn-icon" title="Маркированный список (Ctrl+U)" aria-label="Маркированный список">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-1h9v1H5V3zm-3 5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-1h9v1H5V7zm-3 5a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-1h9v1H5v-1z"/></svg>
        </button>
        <button id="btn-ol" class="btn-icon" title="Нумерованный список (Ctrl+O)" aria-label="Нумерованный список">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h1v2H2V2zm0 3h1v2H2V5zm0 3h1v2H2V8zm3-5h9v1H5V3zm0 4h9v1H5V7zm0 4h9v1H5v-1z"/></svg>
        </button>

        <div class="toolbar-divider"></div>

        <button id="btn-link" class="btn-icon" title="Ссылка (Ctrl+K)" aria-label="Ссылка">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z"/></svg>
        </button>
        <button id="btn-image" class="btn-icon" title="Изображение (Ctrl+G)" aria-label="Изображение">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 2.5a.25.25 0 00-.25.25v10.5c0 .138.112.25.25.25h.94a.76.76 0 01.03-.03l6.077-6.078a1.75 1.75 0 012.412-.06L14.5 10.31V2.75a.25.25 0 00-.25-.25H1.75zm12.5 11H4.81l5.048-5.047a.25.25 0 01.344-.009l4.298 3.889v.917a.25.25 0 01-.25.25zm1.75-.25V2.75A1.75 1.75 0 0014.25 1H1.75A1.75 1.75 0 000 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0016 13.25zM5.5 6a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>
        </button>
        <button id="btn-table" class="btn-icon" title="Таблица (Ctrl+T)" aria-label="Таблица">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V2.75zM1.75 2.5a.25.25 0 00-.25.25V5h13V2.75a.25.25 0 00-.25-.25H1.75zM1.5 6.5v3h4v-3h-4zm5.5 0v3h3v-3H7zm4.5 0v3h2.5v-3H11.5zM1.5 11v2.25c0 .138.112.25.25.25H5.5v-2.5h-4zm5.5 0v2.5h3v-2.5H7zm4.5 0v2.5h2.25a.25.25 0 00.25-.25V11h-2.5z"/></svg>
        </button>
        <button id="btn-tasklist" class="btn-icon" title="Список задач (Ctrl+Shift+L)" aria-label="Список задач">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5zm0-2a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5zm2.734 5.505a.5.5 0 0 1 .5-.5h6.532a.5.5 0 0 1 .5.5v.5a.5.5 0 0 1-.5.5H5.234a.5.5 0 0 1-.5-.5v-.5zm2.44 2.44a.5.5 0 0 1 .5-.5h3.792a.5.5 0 0 1 .5.5v.5a.5.5 0 0 1-.5.5H7.674a.5.5 0 0 1-.5-.5v-.5z"/></svg>
        </button>
        <button id="btn-linebreak" class="btn-icon" title="Пустая строка (Shift+Enter)" aria-label="Пустая строка">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M1 8h10v1H1V8zm10-3l4 4-4 4v-3H5V7h6V4z"/></svg>
        </button>
      </div>
    </div>

    <div class="toolbar-section toolbar-center">
      <!-- Вид -->
      <div class="toolbar-group">
        <button id="toggle-preview" class="btn-toggle active" title="Показать/скрыть превью (Ctrl+P)" aria-label="Переключить превью">
          <svg class="icon icon-lg" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2c1.981 0 3.671.992 4.933 2.078 1.27 1.091 2.187 2.345 2.637 3.023a1.62 1.62 0 0 1 0 1.798c-.45.678-1.367 1.932-2.637 3.023C11.67 13.008 9.981 14 8 14c-1.981 0-3.671-.992-4.933-2.078C1.797 10.83.88 9.576.43 8.898a1.62 1.62 0 0 1 0-1.798c.45-.677 1.367-1.931 2.637-3.022C4.33 2.992 6.019 2 8 2zM1.679 7.932a.12.12 0 0 0 0 .136c.411.622 1.241 1.75 2.366 2.717C5.176 11.758 6.527 12.5 8 12.5c1.473 0 2.825-.742 3.955-1.715 1.124-.967 1.954-2.096 2.366-2.717a.12.12 0 0 0 0-.136c-.412-.621-1.242-1.75-2.366-2.717C10.824 4.242 9.473 3.5 8 3.5c-1.473 0-2.825.742-3.955 1.715-1.124.967-1.954-2.096-2.366 2.717zM8 10a2 2 0 1 1-.001-3.999A2 2 0 0 1 8 10z"/></svg>
          <span class="btn-text">Превью</span>
        </button>

        <div class="toolbar-divider"></div>

        <button id="zoom-out" class="btn-icon" title="Уменьшить масштаб" aria-label="Уменьшить">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 8h10v1H2V8z"/></svg>
        </button>
        <span id="zoom-level" class="zoom-value">100%</span>
        <button id="zoom-in" class="btn-icon" title="Увеличить масштаб" aria-label="Увеличить">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2v6h6v1H8v6H7V9H1V8h6V2h1z"/></svg>
        </button>
        <button id="zoom-reset" class="btn-icon" title="Сбросить масштаб" aria-label="Сбросить масштаб">
          <svg class="icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/></svg>
        </button>

        <div class="toolbar-divider"></div>

        <!-- Переключатель темы -->
        <button id="theme-toggle" class="btn-icon" title="Переключить тему (Ctrl+Shift+D)" aria-label="Переключить тему">
          <svg class="icon icon-lg theme-icon-light" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
          </svg>
          <svg class="icon icon-lg theme-icon-dark" viewBox="0 0 16 16" fill="currentColor" style="display: none;">
            <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="toolbar-section toolbar-right">
      <!-- Файлы -->
      <div class="toolbar-group">
        <button id="quick-save-btn" class="btn-secondary" title="Быстрое сохранение (Ctrl+S)">
          <svg class="icon icon-lg" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"/></svg>
          <span class="btn-text">Сохранить</span>
        </button>
        <button id="save-md-btn" class="btn-secondary">
          <svg class="icon icon-lg" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"/></svg>
          <span class="btn-text">Сохранить как</span>
        </button>
        <button id="save-pdf-btn" class="btn-accent">
          <svg class="icon icon-lg" viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 1A1.5 1.5 0 0 0 1 2.5v11A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-11A1.5 1.5 0 0 0 13.5 1h-11zM2.5 2h11a.5.5 0 0 1 .5.5V7H2V2.5a.5.5 0 0 1 .5-.5zM2 8h12v5.5a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5V8z"/></svg>
          <span class="btn-text">Экспорт PDF</span>
        </button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="editor-pane">
      <!-- <textarea id="markdown-input"></textarea> был удален -->
    </div>
    <div class="preview-pane">
      <div id="pdf-simulation-container"></div>
    </div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
